<div class="p-6 w-[400px]">
    <div class="flex justify-between items-start mb-4">
        <div>
            <h2 class="text-2xl font-bold">Sign In</h2>
            <p class="text-gray-500 text-sm">Sign in to your account to continue shopping</p>
        </div>
        <button (click)="dialogRef.close()" class="cursor-pointer text-gray-400 hover:text-gray-600">
            <mat-icon>close</mat-icon>
        </button>
    </div>

    <div class="flex flex-col gap-4">
        <div class="flex items-center border border-gray-300 rounded-lg px-3 py-2 gap-2 focus-within:border-blue-500">
            <mat-icon class="text-gray-400">email</mat-icon>
            <input 
                [(ngModel)]="email"
                type="email" 
                placeholder="Enter your email"
                class="outline-none flex-1 text-sm"
            />
        </div>

        <div class="flex items-center border border-gray-300 rounded-lg px-3 py-2 gap-2 focus-within:border-blue-500">
            <mat-icon class="text-gray-400">lock</mat-icon>
            <input 
                [(ngModel)]="password"
                [type]="showPassword ? 'text' : 'password'"
                placeholder="Enter your password"
                class="outline-none flex-1 text-sm"
            />
            <button (click)="showPassword = !showPassword" class="cursor-pointer text-gray-400">
                <mat-icon>{{ showPassword ? 'visibility_off' : 'visibility' }}</mat-icon>
            </button>
        </div>

        @if (error) {
            <p class="text-red-500 text-sm text-center">{{ error }}</p>
        }

        <button 
            (click)="signIn()"
            class="w-full bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-lg font-semibold cursor-pointer transition-colors">
            Sign In
        </button>

        <p class="text-center text-sm text-gray-500">
            Don't have an account? 
            <span (click)="openSignUp()" class="text-blue-600 cursor-pointer hover:underline font-medium">Sign Up</span>
        </p>
    </div>
</div>
