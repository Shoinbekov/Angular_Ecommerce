<div class="flex items-center gap-2">
    <div class="inline-flex items-center border border-gray-200 rounded-lg">
        <button matIconButton [disabled]="quantity() === 1" (click)="qtyUpdated.emit(quantity() - 1)">
            <mat-icon>remove</mat-icon>
        </button>
        <div class="px-4 text-base font-medium">{{ quantity() }}</div>
        <button matIconButton (click)="qtyUpdated.emit(quantity() + 1)">
            <mat-icon>add</mat-icon>
        </button>
    </div>
</div>
