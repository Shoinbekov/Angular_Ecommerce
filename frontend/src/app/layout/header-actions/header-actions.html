<div class="flex items-center gap-2">
    <button matIconButton routerLink="/wishlist" [matBadge]="store.wishlistCount()" [matBadgeHidden]="store.wishlistCount() === 0">
        <mat-icon>favorite</mat-icon>
    </button>
    <button matIconButton [matBadge]="store.cartCount()" [matBadgeHidden]="store.cartCount() === 0" routerLink="/cart">
        <mat-icon>shopping_cart</mat-icon>
    </button>

    @if (store.currentUser()) {
        <div class="relative">
            <button (click)="toggleDropdown()" class="w-10 h-10 rounded-full bg-gray-300 flex items-center justify-center cursor-pointer overflow-hidden">
                <mat-icon>person</mat-icon>
            </button>

            @if (showDropdown()) {
                <div class="absolute right-0 top-12 bg-white border border-gray-200 rounded-xl shadow-lg w-52 z-50 p-2">
                    <div class="px-4 py-3 border-b border-gray-100">
                        <p class="font-semibold text-gray-900">{{ store.currentUser()!.name }}</p>
                        <p class="text-sm text-gray-500">{{ store.currentUser()!.email }}</p>
                    </div>
                    <button 
                        (click)="signOut()"
                        class="w-full flex items-center gap-3 px-4 py-3 text-gray-700 hover:bg-gray-50 rounded-lg cursor-pointer mt-1">
                        <mat-icon>logout</mat-icon>
                        Sign Out
                    </button>
                </div>
            }
        </div>
    } @else {
        <button matButton (click)="openSignIn()">Sign In</button>
        <button matButton="filled" (click)="openSignUp()">Sign Up</button>
    }
</div>
