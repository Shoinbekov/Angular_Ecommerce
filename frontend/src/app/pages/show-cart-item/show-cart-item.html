<div class="grid grid-cols-3 items-center gap-4 py-4 border-b border-gray-100">

    <div class="flex items-center gap-4">
        <img [src]="item().product.imageUrl" class="w-20 h-20 rounded-lg object-cover"/>
        <div>
            <div class="text-gray-900 text-base font-semibold">{{ item().product.name }}</div>
            <div class="text-gray-500 text-sm">${{ item().product.price }}</div>
        </div>
    </div>

    <div class="flex justify-center">
        <app-qty-selector 
            [quantity]="item().quantity"
            (qtyUpdated)="store.updateQuantity(item().product, $event)"
        />
    </div>

    <div class="flex items-center justify-end gap-3">
        <span class="text-gray-900 font-bold text-lg">
            ${{ (item().product.price * item().quantity).toFixed(2) }}
        </span>
        <button 
            class="text-gray-400 hover:text-red-500 cursor-pointer transition-colors"
            (click)="store.addToWishlist(item().product)">
            <mat-icon>favorite_border</mat-icon>
        </button>
        <button 
            class="text-gray-400 hover:text-red-500 cursor-pointer transition-colors"
            (click)="store.removeFromCart(item().product)">
            <mat-icon>delete</mat-icon>
        </button>
    </div>

</div>
