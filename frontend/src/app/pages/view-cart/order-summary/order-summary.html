<div class="border border-gray-200 rounded-xl p-6 bg-white">
    <h2 class="text-2xl font-bold mb-6">Order Summary</h2>

    <div class="flex flex-col gap-4">
        <div class="flex justify-between text-gray-600">
            <span>Subtotal</span>
            <span>${{ subtotal.toFixed(2) }}</span>
        </div>
        <div class="flex justify-between text-gray-600">
            <span>Tax (5%)</span>
            <span>${{ tax.toFixed(2) }}</span>
        </div>
        <div class="border-t border-gray-200 pt-4 flex justify-between font-bold text-lg">
            <span>Total</span>
            <span>${{ total.toFixed(2) }}</span>
        </div>
    </div>

    <button routerLink="/checkout"
    class="w-full mt-6 bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-lg font-semibold cursor-pointer transition-colors">
    Checkout
</button>
</div>
