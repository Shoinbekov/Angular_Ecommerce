<mat-sidenav-container class="h-full">

    <mat-sidenav mode="side" opened class="bg-white border-r border-gray-200">
        <div class="p-6">
            <h2 class="text-lg text-gray-900 mb-2">Categories</h2>
            <mat-nav-list>
                @for (cat of categories(); track cat) {
                    <mat-list-item [activated]="cat === category()" class="my-2" [routerLink]="['/products', cat]">
                        <span matListItemTitle class="font-medium capitalize" [class]="cat === category() ? '!text-white': null">{{ cat | titlecase }}</span>
                    </mat-list-item>
                }
            </mat-nav-list>
        </div>
    </mat-sidenav>

    <mat-sidenav-content class="bg-gray-100 p-6 h-full">
        <h1 class="text-2xl font-bold text-gray-900 mb-6 capitalize">
            {{ category() | titlecase }}
        </h1>

        <p class="text-gray-600 mb-6">
            {{ store.filteredProducts().length }} products found
        </p>

        <div class="responsive-grid">
            @for (product of store.filteredProducts(); track product.id) {
                <div class="relative">
                    <app-product-card [product]="product" (addToCartClicked)="addToCart($event)" />
                    <app-toggle-wishlist-button [product]="product" class="absolute top-3 right-3 z-10" />
                </div>
            }
        </div>
    </mat-sidenav-content>

</mat-sidenav-container>
